name: Release

# Publishes automatically when package.json changes on main (a version bump).
# Merge a PR that bumps the version and this builds, tests, publishes to npm,
# and cuts a GitHub Release (which updates the Marketplace listing).
# One-time setup: add a repository secret NPM_TOKEN (an npm automation token).

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - name: Read version
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: tag
        run: |
          if git rev-parse "v${{ steps.v.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.tag.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.v.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "v${{ steps.v.outputs.version }}" \
            --notes "Automated release of v${{ steps.v.outputs.version }}. See the README for what changed."
