name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - name: Self scan
        run: |
          node dist/src/cli.js scan-workflows
          cat .ace/receipts/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Example gates
        run: |
          node dist/src/cli.js check --file examples/safe-workflow.yml
          if node dist/src/cli.js check --file examples/vulnerable-workflow.yml; then
            echo "vulnerable example was expected to FAIL"
            exit 1
          else
            echo "vulnerable example correctly blocked"
          fi
