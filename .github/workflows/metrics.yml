name: Business metrics

# Weekly business follow-up so a shipped product never goes unwatched.
# Collects npm + GitHub metrics, appends a snapshot, and prints a short read.
# Runs every Monday, and can be run on demand from the Actions tab.

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/metrics.mjs

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/ace-receipts.csv
          if git diff --cached --quiet; then
            echo "No metrics change."
          else
            git commit -m "chore(metrics): weekly ace-receipts snapshot"
            git push || echo "Push skipped (branch protection?). Snapshot is in the job summary."
          fi
