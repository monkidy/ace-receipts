# Intentionally vulnerable example. Do not use this workflow.
# Expected verdict from ace-receipts: FAIL.
name: AI Auto Review
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Ask the agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT="Review this PR: ${{ github.event.pull_request.body }}"
          npx some-llm-cli --prompt "$PROMPT" --post-comment
