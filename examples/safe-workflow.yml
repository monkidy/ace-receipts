# Safe example: an agent gate that brings receipts.
# Expected verdict from ace-receipts: PASS.
name: Agent review gate
on:
  pull_request:

permissions:
  contents: read

jobs:
  receipts:
    runs-on: ubuntu-latest
    environment: agent-gate
    steps:
      # Pinned to a full commit SHA. Replace with the SHA you trust.
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Bring receipts
        run: npx ace-receipts scan-workflows
